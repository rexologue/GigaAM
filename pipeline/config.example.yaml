input:
  audio_dir: ~/datasets/dialog_audio
  manifest_path: null
  glob: "*.mp3"

output:
  out_dir: ../runs/dialog_pipeline

pipeline:
  # mode: full_asr_then_align | diar_cut_then_asr
  mode: full_asr_then_align
  # execution: sequential | batched | multi_instance
  execution: sequential
  # multi_instance starts num_instances worker processes; each process owns its own models.
  num_instances: 1
  # Number of pending file batches allowed per instance.
  batches_per_instance: 1
  # Files per batch inside one process/instance.
  file_batch_size: 4
  # Files pooled into one ASR call after diarization.
  asr_file_batch_size: 4
  show_progress: true
  suppress_internal_progress: true

diarizer:
  model_name: nvidia/diar_streaming_sortformer_4spk-v2.1
  device: cuda:0
  # null means use file_batch_size for batched execution.
  batch_size: null

asr:
  model_name: v3_ctc
  device: cuda:0
  max_sec: 22.0
  overlap_sec: 1.0
  # Number of audio chunks per GigaAM forward pass.
  chunk_batch_size: 8
  # Used by diar_cut_then_asr.
  segment_max_sec: 22.0

resume:
  enabled: true
  retry_failed: false
  skip_if_outputs_exist: true

speaker_rules:
  third_spk_max_share: 0.10
  equal_share_eps: 0.05
  max_speakers_allowed: 3
