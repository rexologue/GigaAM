input:
  audio_dir: ~/datasets/dialog_audio
  manifest_path: null
  glob: "*.mp3"

output:
  out_dir: ../runs/dialog_pipeline

pipeline:
  # mode: full_asr_then_align | diar_cut_then_asr
  mode: full_asr_then_align
  # execution: sequential keeps the old one-file-at-a-time behavior.
  # batched groups several files for Sortformer and, in full_asr_then_align, GigaAM CTC.
  execution: sequential
  file_batch_size: 4
  asr_file_batch_size: 4
  show_progress: true
  suppress_internal_progress: true

diarizer:
  model_name: nvidia/diar_streaming_sortformer_4spk-v2.1
  device: cuda:0
  # null means use file_batch_size for batched execution.
  batch_size: null

asr:
  model_name: v3_ctc
  device: cuda:0
  max_sec: 22.0
  overlap_sec: 1.0
  # Number of audio chunks per GigaAM forward pass.
  chunk_batch_size: 8
  # Used by diar_cut_then_asr.
  segment_max_sec: 22.0

resume:
  enabled: true
  retry_failed: false
  skip_if_outputs_exist: true

speaker_rules:
  third_spk_max_share: 0.10
  equal_share_eps: 0.05
  max_speakers_allowed: 3
